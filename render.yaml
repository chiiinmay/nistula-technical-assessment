services:
  - type: web
    name: nistula-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CLAUDE_API_KEY
        sync: false # Set this manually in Render dashboard
      - key: MODEL_NAME
        value: claude-sonnet-4-20250514
